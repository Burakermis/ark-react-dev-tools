<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>ARK React DevTools</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #20232a;
      color: #ffffff;
      height: 100vh;
      overflow: hidden;
      font-size: 11px;
    }

    #container {
      display: flex;
      height: 100vh;
    }

    #sidebar {
      width: 300px;
      background: #20232a;
      border-right: 1px solid #373940;
      overflow-y: auto;
      overflow-x: hidden;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    #main {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      background: #20232a;
      display: flex;
      flex-direction: column;
    }

    #header {
      padding: 8px 12px;
      background: #20232a;
      border-bottom: 1px solid #373940;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #inspectBtn {
      background: #0e639c;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }

    #searchInput {
      background: #282c34;
      border: 1px solid #373940;
      color: #d4d4d4;
      padding: 4px 8px;
      border-radius: 4px;
      width: 100%;
      margin-top: 6px;
      font-size: 12px;
    }

    #searchInput:focus {
      outline: none;
      border-color: #61dafb;
    }

    #inspectBtn:hover {
      background: #1177bb;
    }

    #inspectBtn.active {
      background: #61dafb;
      color: #20232a;
    }

    #refreshBtn {
      background: #373940;
      color: white;
      border: none;
      padding: 6px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      margin-left: 6px;
      transition: background 0.2s;
    }

    #refreshBtn:hover {
      background: #4e4e52;
    }

    .component-item {
      padding: 2px 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      white-space: nowrap;
      transition: background 0.1s;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .component-item:hover {
      background: #373940;
    }

    .component-item.selected {
      background: #264f78;
    }

    .component-name {
      color: #61dafb;
    }

    .component-type {
      font-size: 11px;
      color: #858585;
      margin-left: 6px;
    }

    .section {
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 11px;
      font-weight: bold;
      color: #999;
      text-transform: uppercase;
      margin-bottom: 8px;
      margin-top: 16px;
    }

    .property {
      margin-bottom: 2px;
      font-size: 12px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
    }

    .property-key {
      color: #ef596f;
      font-weight: normal;
    }

    .property-value {
      color: #d19a66;
      margin-left: 6px;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #858585;
    }

    .tree-children, .property-tree-children {
      margin-left: 6px;
    }

    .tree-toggle {
      cursor: pointer;
      display: inline-block;
      width: 12px;
      height: 12px;
      line-height: 12px;
      text-align: center;
      user-select: none;
      color: #666;
      margin-right: 2px;
      font-size: 9px;
      transition: transform 0.1s;
    }

    .tree-toggle.expanded {
      transform: rotate(90deg);
    }

    .info-badge {
      display: inline-block;
      padding: 1px 4px;
      background: #373940;
      border-radius: 2px;
      font-size: 10px;
      margin-left: 4px;
      color: #999;
    }

    .badge-type {
      background: #444;
      color: #ccc;
      padding: 0 3px;
      border-radius: 2px;
      font-size: 9px;
      margin-left: 4px;
      font-weight: normal;
    }

    .breadcrumb {
      padding: 8px 12px;
      background: #282c34;
      border-bottom: 1px solid #373940;
      font-size: 11px;
      display: flex;
      gap: 4px;
      align-items: center;
      flex-wrap: wrap;
    }

    .breadcrumb-item {
      color: #ccc;
    }

    .breadcrumb-separator {
      color: #666;
    }

    .breadcrumb-current {
      color: #61dafb;
      font-weight: bold;
    }

    .hook-item {
      display: flex;
      align-items: flex-start;
      margin-bottom: 4px;
    }

    .hook-index {
      color: #777;
      margin-right: 8px;
      font-family: monospace;
      font-size: 11px;
      width: 15px;
      text-align: right;
    }

    #details {
      padding: 12px;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #858585;
    }

    #stats {
      font-size: 11px;
      color: #858585;
    }

    #resizer {
      width: 4px;
      background: #373940;
      cursor: col-resize;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    #resizer:hover,
    #resizer.resizing {
      background: #61dafb;
    }

    body.resizing {
      user-select: none;
      cursor: col-resize;
    }
  </style>
</head>

<body>
  <div id="container">
    <div id="sidebar">
      <div id="header">
        <div style="flex: 1; margin-right: 8px;">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <strong>ARK React DevTools</strong>
            <span id="stats"></span>
          </div>
          <input type="text" id="searchInput" placeholder="Search (text or /regex/)">
        </div>
        <div style="display: flex; align-items: center; gap: 4px;">
          <button id="inspectBtn" title="Inspect Page">🔍</button>
          <button id="refreshBtn" title="Refresh Tree">🔄</button>
        </div>
      </div>
      <div id="componentTree"></div>
    </div>
    <div id="resizer"></div>
    <div id="main">
      <div id="details-header"></div>
      <div id="details"></div>
    </div>
  </div>

  <script src="panel.js"></script>
</body>

</html>
